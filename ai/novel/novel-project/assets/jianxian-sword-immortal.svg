<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="45%" style="stop-color:#1a2f4a"/>
      <stop offset="100%" style="stop-color:#2d4a6a"/>
    </linearGradient>
    <linearGradient id="moonGlow" x1="50%" y1="50%" x2="50%" y2="100%">
